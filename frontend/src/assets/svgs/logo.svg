<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="neon" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur1"/>
      <feGaussianBlur stdDeviation="6" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer glow rings -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="#22d3ee" stroke-width="6" opacity="0.1"/>
  <circle cx="50" cy="50" r="43" fill="none" stroke="#22d3ee" stroke-width="3" opacity="0.2"/>

  <!-- Dark hexagon -->
  <polygon points="50,8 88,30 88,70 50,92 12,70 12,30" fill="#0f172a" stroke="#22d3ee" stroke-width="3"/>

  <!-- Inner border -->
  <polygon points="50,12 84,32 84,68 50,88 16,68 16,32" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.3"/>

  <!-- Glowing cyan checkmark -->
  <path d="M 30 48 L 42 62 L 70 32" stroke="#22d3ee" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.3" filter="url(#neon)"/>
  <path d="M 30 48 L 42 62 L 70 32" stroke="#22d3ee" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>